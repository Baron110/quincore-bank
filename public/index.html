<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#091426" />
    <meta name="description" content="QuinCore Bank — Premium Digital Banking" />
    <title>QuinCore Bank</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Hanken+Grotesk:wght@600;700;800&display=swap" rel="stylesheet" />
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        display: inline-block;
        vertical-align: middle;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        background-color: #f7f9fb;
      }
      h1, h2, h3, h4 { font-family: 'Hanken Grotesk', sans-serif; }
      .card-texture {
        background-image: radial-gradient(circle at 2px 2px, rgba(9,20,38,0.05) 1px, transparent 0);
        background-size: 24px 24px;
      }
    </style>
  </head>
  <body class="bg-background text-on-background min-h-screen">
    <noscript>You need to enable JavaScript to run QuinCore Bank.</noscript>
    <div id="root"></div>
  </body>
</html>
